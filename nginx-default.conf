# ==========================================
# oPanel Master Configuration (Port 7443)
# ==========================================
server {
    listen 7443 ssl http2;
    listen [::]:7443 ssl http2;
    
    # Catch-all so the panel loads on the server's raw IP address initially
    server_name _; 

    # Initial Self-Signed Keys (Generated by install.sh)
    ssl_certificate /etc/ssl/certs/mypanel-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/mypanel-selfsigned.key;

    # Strong SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /opt/panel/www;
    index index.php index.html;

    # Custom oPanel Error Pages
    include /etc/nginx/snippets/opanel-errors.conf;

    # Security: Block browser access to hidden files (like .git or .env)
    location ~ /\. {
        deny all;
    }

    # Security: Block browser access to your backend PHP classes and config
    location ^~ /classes/ {
        deny all;
    }
    location ^~ /config/ {
        deny all;
    }

    # ==========================================
    # ROUTING: Clean Extensionless URLs
    # ==========================================
    
    # 1. EXEMPT AJAX: Do not redirect background data calls
    location /ajax/ {
        try_files $uri $uri/ =404;
    }

    # 2. Force Clean URLs (Remove .php from the address bar for actual pages)
    # We ignore the /ajax/, /classes/, and /config/ directories here
    if ($request_uri ~ ^/(?!(ajax|classes|config))(.*)\.php(\?|$)) {
        return 301 /$1$2$is_args$args;
    }

    # 3. Internal Routing
    location / {
        # Try the exact URI, then a directory, then silently append .php and execute
        try_files $uri $uri/ $uri.php$is_args$args;
    }

    # 3. PHP Execution Block
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock; 
    }
}